<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password – SecureDNS Guard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .auth-wrapper { background-image: radial-gradient(ellipse at top right, var(--accent-glow) 0%, transparent 40%), radial-gradient(ellipse at bottom left, rgba(59,130,246,0.08) 0%, transparent 40%); }
        .auth-card { animation: modalIn 0.4s ease; max-width: 420px; width: 100%; margin: 2rem; padding: 2.5rem; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-box { display: none; text-align: center; padding: 1rem 0; }
        .success-box svg { color: var(--accent); width: 48px; height: 48px; margin-bottom: 1rem; }
        
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.75rem; }
        .pw-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 0; line-height: 1; }
        .pw-toggle:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            
            <div id="form-container">
                <div class="auth-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" width="48" height="48" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <h2 style="margin-top: 0.75rem; font-weight: 700;">New Password</h2>
                    <p class="text-muted" style="margin-top: 0.25rem;">Enter your new password below</p>
                </div>

                <form id="resetForm">
                    <input type="hidden" id="token" value="{{ request.args.get('token', '') }}">
                    <div>
                        <label style="font-weight: 600; font-size: 0.8rem; margin-bottom: 0.35rem; display: block; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">New Password</label>
                        <div class="pw-wrap">
                            <input type="password" id="password" placeholder="••••••••" required minlength="6">
                            <button type="button" class="pw-toggle" onclick="togglePw('password', this)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn" id="submit-btn" style="width: 100%; padding: 0.65rem; margin-top: 1rem;">Update Password</button>
                    <div id="error-msg" class="text-danger" style="text-align: center; font-size: 0.875rem; margin-top: 1rem;"></div>
                </form>
            </div>

            <div class="success-box" id="success-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h3 style="font-weight: 600; font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-primary);">Password Updated!</h3>
                <p class="text-muted" style="font-size: 0.9rem; line-height: 1.5;">Your password has been changed successfully.</p>
                <a href="/login" class="btn" style="display: block; margin-top: 1.5rem; text-decoration: none;">Go to Login</a>
            </div>
        </div>
    </div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            const password = document.getElementById('password').value;
            const token = document.getElementById('token').value;
            
            if (!token) {
                errEl.textContent = 'Invalid or missing token.';
                return;
            }

            errEl.textContent = '';
            btn.innerHTML = '<span class="spinner"></span> Updating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token, password })
                });
                
                if (res.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-box').style.display = 'block';
                } else {
                    const data = await res.json();
                    errEl.textContent = data.error || 'Failed to update password';
                    btn.textContent = 'Update Password';
                    btn.disabled = false;
                }
            } catch(err) {
                errEl.textContent = 'Network error. Please try again.';
                btn.textContent = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
