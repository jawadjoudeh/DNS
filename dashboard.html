<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – SecureDNS Guard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay"></div>
        
        <main class="main-wrapper">
            <header class="topbar" id="topbar"></header>
            
            <div class="content">
                <div class="page-header"><h1 class="page-title">Dashboard</h1></div>

                <!-- Stat cards -->
                <div class="grid-4 mb-4">
                    <div class="card stat-card stat-blue">
                        <div class="stat-title">DNS Queries</div>
                        <div class="stat-value blue skeleton" id="kpi-total">0</div>
                        <div class="stat-subtitle" id="kpi-total-sub"></div>
                    </div>
                    <div class="card stat-card stat-red">
                        <div class="stat-title">Blocked by filters</div>
                        <div class="stat-value red skeleton" id="kpi-blocked">0</div>
                        <div class="stat-subtitle" id="kpi-blocked-sub"></div>
                    </div>
                    <div class="card stat-card stat-green">
                        <div class="stat-title">Safe queries</div>
                        <div class="stat-value green skeleton" id="kpi-safe">0</div>
                        <div class="stat-subtitle" id="kpi-safe-sub"></div>
                    </div>
                    <div class="card stat-card stat-yellow">
                        <div class="stat-title">Model Accuracy</div>
                        <div class="stat-value yellow skeleton" id="kpi-acc">0%</div>
                        <div class="stat-subtitle">IsolationForest + RF</div>
                    </div>
                </div>

                <!-- Chart -->
                <div class="card mb-4">
                    <div class="card-header"><h2 class="card-title">DNS queries</h2></div>
                    <div id="chart-container" style="height: 300px; position: relative;">
                        <div class="empty-state" id="chart-empty">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                            <p>No DNS data collected yet.<br>Start the proxy to begin monitoring.</p>
                        </div>
                        <canvas id="hourlyChart"></canvas>
                    </div>
                </div>
                
                <!-- Recent blocked -->
                <div class="card">
                    <div class="card-header"><h2 class="card-title">Recent blocked domains</h2></div>
                    <div class="table-responsive" style="margin: 0;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="background:transparent;">Time</th>
                                    <th style="background:transparent;">Client IP</th>
                                    <th style="background:transparent;">Domain</th>
                                    <th style="background:transparent;">Confidence</th>
                                </tr>
                            </thead>
                            <tbody id="alerts-feed">
                                <tr><td colspan="4" class="skeleton" style="height:40px; border-color:transparent;"></td></tr>
                                <tr><td colspan="4" class="skeleton" style="height:40px; border-color:transparent;"></td></tr>
                                <tr><td colspan="4" class="skeleton" style="height:40px; border-color:transparent;"></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-3" style="text-align:center;">
                        <a href="/threat_logs?verdict=Malicious" style="font-size:0.875rem;">View all blocked domains →</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const me = await checkAuth();
            if (me) {
                document.getElementById('sidebar').innerHTML = renderSidebar(me.is_admin);
                document.getElementById('topbar').innerHTML = renderTopbar(me);
                setActiveNavLink(); initMobileMenu();
            }
            initDashboardPoller();
            fetchHourly();
            fetchAlerts();
            setInterval(fetchAlerts, 10000);
            /* Show setup guide if this account has never sent a DNS query */
            maybeShowSetupModal();

            fetch('/api/alerts/check').then(r=>r.json()).then(d => {
                if(d.alert) showToast("New high-confidence threats detected!", "warning", 5000);
            }).catch(()=>{});
        });

        /* ── Chart with empty-state ── */
        async function fetchHourly() {
            const res = await fetch('/api/stats/hourly');
            if (!res.ok) return;
            const data = await res.json();
            
            const hasData = data.some(d => d.safe > 0 || d.blocked > 0);
            const emptyEl = document.getElementById('chart-empty');
            const canvas = document.getElementById('hourlyChart');

            if (!hasData) {
                emptyEl.style.display = 'flex';
                canvas.style.display = 'none';
                return;
            }
            emptyEl.style.display = 'none';
            canvas.style.display = 'block';

            const labels = data.map(d => new Date(d.hour).getHours() + ':00');
            const safe = data.map(d => d.safe);
            const blocked = data.map(d => d.blocked);

            const style = getComputedStyle(document.documentElement);
            const gridColor   = style.getPropertyValue('--border-color').trim();
            const textColor   = style.getPropertyValue('--text-secondary').trim();
            const dangerColor = style.getPropertyValue('--danger').trim();
            const safeColor   = style.getPropertyValue('--success').trim();

            new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Blocked', data: blocked, backgroundColor: dangerColor, borderRadius: 2 },
                        { label: 'Safe', data: safe, backgroundColor: safeColor, borderRadius: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { color: gridColor }, ticks: { color: textColor } },
                        y: { stacked: true, grid: { color: gridColor }, ticks: { color: textColor } }
                    },
                    plugins: { legend: { labels: { color: textColor, usePointStyle: true, boxWidth: 8 } } }
                }
            });
        }

        /* ── Recent alerts ── */
        function _esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

        async function fetchAlerts() {
            const res = await fetch('/api/logs/recent-alerts');
            if (!res.ok) return;
            const logs = await res.json();
            const feed = document.getElementById('alerts-feed');
            feed.innerHTML = '';
            if (logs.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 4;
                td.innerHTML = `<div class="empty-state" style="padding:2rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:32px;height:32px;" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <p>No blocked domains yet. All clear!</p>
                </div>`;
                tr.appendChild(td);
                feed.appendChild(tr);
                return;
            }
            logs.forEach(l => {
                const tr = document.createElement('tr');
                const conf = l.confidence != null ? (l.confidence * 100).toFixed(0) : '—';
                tr.innerHTML = `
                    <td class="text-muted" style="white-space:nowrap;">${_esc(new Date(l.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}))}</td>
                    <td>${_esc(l.source_ip)}</td>
                    <td class="text-danger" style="word-break:break-all;">${_esc(l.domain_name)}</td>
                    <td><span class="badge red">${_esc(conf)}%</span></td>`;
                feed.appendChild(tr);
            });
        }
    </script>
</body>
</html>
