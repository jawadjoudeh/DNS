<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Secure DNS Queries</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .auth-wrapper { background-image: radial-gradient(ellipse at top right, var(--accent-glow) 0%, transparent 40%), radial-gradient(ellipse at bottom left, rgba(59,130,246,0.08) 0%, transparent 40%); }
        .auth-card { animation: modalIn 0.4s ease; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-box { display: none; text-align: center; padding: 1rem 0; }
        .success-box svg { color: var(--accent); width: 48px; height: 48px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            
            <div id="form-container">
                <div class="auth-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" width="48" height="48" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <h2 style="margin-top: 0.75rem; font-weight: 700;">Reset Password</h2>
                    <p class="text-muted" style="margin-top: 0.25rem;">Enter your email to receive a reset link</p>
                </div>

                <form id="resetForm">
                    <div>
                        <label style="font-weight: 600; font-size: 0.8rem; margin-bottom: 0.35rem; display: block; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    
                    <button type="submit" class="btn" id="submit-btn" style="width: 100%; padding: 0.65rem; margin-top: 0.5rem;">Send Reset Link</button>
                    <div id="error-msg" class="text-danger" style="text-align: center; font-size: 0.875rem; margin-top: 1rem;"></div>
                </form>
            </div>

            <div class="success-box" id="success-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h3 style="font-weight: 600; font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-primary);">Check your inbox</h3>
                <p class="text-muted" style="font-size: 0.9rem; line-height: 1.5;">If an account exists with that email, a password reset link has been sent.</p>
            </div>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
                <a href="/login" style="color: var(--text-secondary); font-weight: 500;">← Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            const email = document.getElementById('email').value.trim();
            
            errEl.textContent = '';
            btn.innerHTML = '<span class="spinner"></span> Sending...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                
                if (res.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-box').style.display = 'block';
                } else {
                    const data = await res.json();
                    errEl.textContent = data.error || 'Failed to send request';
                    btn.textContent = 'Send Reset Link';
                    btn.disabled = false;
                }
            } catch(err) {
                errEl.textContent = 'Network error. Please try again.';
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
