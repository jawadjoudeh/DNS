<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - SecureDNS Guard</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">🛡️ SecureDNS</div>
            <a href="/dashboard.html" class="nav-item">Dashboard</a>
            <a href="/threat_logs.html" class="nav-item">Threat Logs</a>
            <a href="/profile.html" class="nav-item">API Keys</a>
            <a href="/settings.html" class="nav-item">Settings</a>
            <a href="/logout" class="nav-item" style="margin-top: auto; color: var(--danger);">Logout</a>
        </aside>
        
        <div class="sidebar-overlay"></div>

        <main class="main-content">
            <header class="top-header">
                <button class="hamburger-btn">☰</button>
                <h2>My Dashboard</h2>
                <div id="user-profile" style="display:flex; align-items:center; gap:10px;"></div>
            </header>

            <div class="content-area">
                <div class="grid-kpi">
                    <div class="card kpi-card"><h3>My Queries</h3><div class="value skeleton" id="kpi-total">0000</div></div>
                    <div class="card kpi-card"><h3>Blocked</h3><div class="value skeleton" id="kpi-blocked" style="color: var(--danger);">000</div></div>
                    <div class="card kpi-card"><h3>Safe</h3><div class="value skeleton" id="kpi-safe" style="color: var(--success);">000</div></div>
                    <div class="card kpi-card">
                        <h3>Client Proxy</h3>
                        <a href="/api/proxy/download" class="btn" style="padding: 0.4rem 1rem; font-size: 0.8rem; margin-top: 0.5rem; display:inline-block;">Download Proxy.py</a>
                    </div>
                </div>

                <div class="grid-2" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                    <div class="card">
                        <h3>My Traffic (24h)</h3>
                        <div style="height: 300px; margin-top: 1rem;"><canvas id="hourlyChart"></canvas></div>
                    </div>
                    <div class="card">
                        <h3>Quick Test</h3>
                        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1rem;">Check a domain manually against the ML model.</p>
                        <input type="text" id="test-domain" placeholder="example.com">
                        <button class="btn outline" onclick="testDomain()" style="width: 100%;">Test Domain</button>
                        <div id="test-result" style="margin-top: 1rem; padding: 1rem; background: var(--bg-primary); border-radius: 6px; display: none;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/assets/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const me = await checkAuth();
            if (me) {
                document.getElementById('user-profile').innerHTML = `
                    <span style="font-size: 0.875rem;">Welcome, <strong>${me.username}</strong></span>
                    <span class="badge blue">${me.plan.toUpperCase()}</span>
                `;
            }
            initDashboardPoller();
            fetchHourly();
            
            fetch('/api/alerts/check').then(r=>r.json()).then(d => {
                if(d.alert) showToast("Your devices generated high-confidence threat alerts recently.", "warning", 5000);
            }).catch(()=>{});
        });

        async function fetchHourly() {
            const res = await fetch('/api/stats/hourly');
            if (!res.ok) return;
            const data = await res.json();
            
            const labels = data.map(d => new Date(d.hour).getHours() + ':00');
            const safe = data.map(d => d.safe);
            const blocked = data.map(d => d.blocked);

            const ctx = document.getElementById('hourlyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Safe', data: safe, backgroundColor: '#22c55e' },
                        { label: 'Blocked', data: blocked, backgroundColor: '#ef4444' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        y: { stacked: true, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { labels: { color: '#f8fafc' } } }
                }
            });
        }

        async function testDomain() {
            const d = document.getElementById('test-domain').value;
            if(!d) return;
            
            document.getElementById('test-result').style.display = 'block';
            document.getElementById('test-result').innerHTML = '<span class="skeleton" style="width:100%; height:20px; display:inline-block;"></span>';
            
            const res = await fetch('/api/classify', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({domain: d})});
            if (res.ok) {
                const data = await res.json();
                const color = data.blocked ? 'var(--danger)' : 'var(--success)';
                document.getElementById('test-result').innerHTML = `
                    <div style="font-weight:bold; color:${color}">${data.prediction}</div>
                    <div style="font-size:0.875rem; color:var(--text-secondary); margin-top:0.5rem;">Confidence: ${(data.confidence*100).toFixed(1)}%</div>
                `;
            }
        }
    </script>
</body>
</html>
