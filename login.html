<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SecureDNS Guard</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="container auth-form">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Login</h2>
            <form id="loginForm">
                <input type="text" id="identity" placeholder="Email or Username" required>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'" style="position: absolute; right: 10px; top: 12px; background: none; border: none; color: #fff; cursor: pointer;">👁️</button>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label><input type="checkbox"> Remember me</label>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Sign In</button>
                <div id="error-msg" style="color: var(--danger); margin-top: 1rem; text-align: center;"></div>
            </form>
            
            <div id="oauth-section" style="margin-top: 2rem; text-align: center;">
                <div style="color: var(--text-secondary); margin-bottom: 1rem;">── or continue with ──</div>
                <div id="oauth-buttons" style="display: flex; gap: 1rem; justify-content: center;"></div>
            </div>
        </div>
    </div>
    
    <script src="/assets/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Loading...';
            
            const identity = document.getElementById('identity').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({identity, password})
            });
            const data = await res.json();
            
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                document.getElementById('error-msg').textContent = data.error;
                btn.textContent = 'Sign In';
            }
        });
        
        fetch('/api/auth/providers').then(r => r.json()).then(p => {
            const container = document.getElementById('oauth-buttons');
            if (p.google) container.innerHTML += `<a href="/api/auth/google/login" class="btn" style="background: white; color: black;">G Google</a>`;
            if (p.github) container.innerHTML += `<a href="/api/auth/github/login" class="btn" style="background: #333; color: white;">GitHub</a>`;
        });
    </script>
</body>
</html>
