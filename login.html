<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SecureDNS Guard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .auth-wrapper { background-image: radial-gradient(ellipse at top left, var(--accent-glow) 0%, transparent 40%), radial-gradient(ellipse at bottom right, rgba(59,130,246,0.08) 0%, transparent 40%); }
        .auth-card { animation: modalIn 0.4s ease; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; gap: 0.75rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        .divider span { color: var(--text-secondary); font-size: 0.8rem; font-weight: 500; }
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.75rem; }
        .pw-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 0; line-height: 1; }
        .pw-toggle:hover { color: var(--text-primary); }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" width="48" height="48" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <h2 style="margin-top: 0.75rem; font-weight: 700;">SecureDNS Guard</h2>
                <p class="text-muted" style="margin-top: 0.25rem;">Sign in to manage your network</p>
            </div>

            <form id="loginForm">
                <div>
                    <label style="font-weight: 600; font-size: 0.8rem; margin-bottom: 0.35rem; display: block; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Username or Email</label>
                    <input type="text" id="identity" placeholder="admin@network.local" required>
                </div>
                <div>
                    <label style="font-weight: 600; font-size: 0.8rem; margin-bottom: 0.35rem; display: block; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1" aria-label="Show password">
                            <svg id="pw-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" id="submit-btn" style="width: 100%; padding: 0.65rem;">Sign In</button>
                <div id="error-msg" class="text-danger" style="text-align: center; font-size: 0.875rem; margin-top: 1rem;"></div>
            </form>

            <div id="oauth-section" style="display: none;">
                <div class="divider"><span>OR</span></div>
                <div id="oauth-buttons" class="d-flex gap-2" style="justify-content: center;"></div>
            </div>

            <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                <a href="/forgot-password" style="color: var(--text-secondary);">Forgot your password?</a>
            </div>

            <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                <span class="text-muted">Don't have an account?</span>
                <a href="/register" style="font-weight: 600; margin-left: 0.25rem;">Create Account</a>
            </div>

            <div style="text-align: center; margin-top: 0.75rem; font-size: 0.85rem;">
                <a href="/" style="color: var(--text-secondary);">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const _oauthErrors = {
            oauth_denied:   'OAuth sign-in was cancelled.',
            oauth_failed:   'OAuth sign-in failed. Please try again.',
            oauth_no_email: 'OAuth provider did not return an email address.',
            email_taken:    'That email is already linked to a password account. Sign in with your password instead.'
        };
        (function(){
            const p = new URLSearchParams(window.location.search);
            const err = p.get('error');
            if (err) {
                const el = document.getElementById('error-msg');
                el.textContent = _oauthErrors[err] || 'Sign-in error. Please try again.';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            errEl.textContent = '';
            btn.innerHTML = '<span class="spinner"></span> Signing in…';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        identity: document.getElementById('identity').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errEl.textContent = data.error || 'Login failed';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch(err) {
                errEl.textContent = 'Network error. Please try again.';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.innerHTML = show
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        }

        fetch('/api/auth/providers').then(r => r.json()).then(p => {
            const container = document.getElementById('oauth-buttons');
            let has = false;
            if (p.google) { container.innerHTML += `<a href="/api/auth/google/login" class="btn outline" style="flex:1;">Google</a>`; has = true; }
            if (has) document.getElementById('oauth-section').style.display = 'block';
        }).catch(() => {});
    </script>
</body>
</html>
