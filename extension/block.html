<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked – Secure DNS Query</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #ef4444;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 500px;
      width: 92%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .shield { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 800; color: #ef4444; margin-bottom: 0.5rem; }
    .domain {
      font-size: 1rem; font-weight: 700; color: #f1f5f9;
      background: #0f172a; padding: 0.5rem 1rem;
      border-radius: 8px; margin: 1rem 0;
      word-break: break-all; border: 1px solid #334155;
    }
    .badge {
      display: inline-block; padding: 0.3rem 0.9rem;
      border-radius: 999px; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem;
    }
    .badge.dga       { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge.tunneling { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .badge.blacklist { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
    .reason { font-size: 0.875rem; color: #94a3b8; margin-bottom: 1.75rem; line-height: 1.6; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 0.6rem 1.4rem; border-radius: 8px;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; border: none; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.8; }
    .btn-back    { background: #3b82f6; color: #fff; }
    .btn-proceed { background: transparent; border: 1px solid #475569; color: #64748b; }
    .footer { margin-top: 1.5rem; font-size: 0.72rem; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡️</div>
    <h1>Site Blocked</h1>
    <div class="domain" id="domain">—</div>
    <div><span class="badge" id="badge">Malicious</span></div>
    <p class="reason" id="reason">This domain was flagged as malicious by Secure DNS Query.</p>
    <div class="actions">
      <button class="btn-back" id="btn-back">← Go Back</button>
      <button class="btn-proceed" id="btn-proceed">Proceed anyway (unsafe)</button>
    </div>
    <div class="footer">Protected by Secure DNS Query · <a href="#" id="link-dashboard" style="color:#475569">Open Dashboard</a></div>
  </div>

  <script src="block.js"></script>
</body>
</html>
