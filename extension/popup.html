<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure DNS Queries</title>
<style>
  :root {
    --bg:#0b0f14; --bg2:#11161d; --bg3:#1a212c;
    --border:#222b38; --text:#e8edf3; --muted:#69748a;
    --accent:#00e5a0; --accent2:#00b87a; --danger:#ff4757; --warn:#f59e0b;
    --mono:'JetBrains Mono','Courier New',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:360px;background:var(--bg);color:var(--text);font:13px system-ui,sans-serif}

  .header{padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px}
  .shield{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px}
  .brand-name{font-weight:700;font-size:13px}
  .brand-sub{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:.05em;margin-top:1px}

  .toggle{position:relative;width:38px;height:20px}
  .toggle input{opacity:0;width:0;height:0}
  .track{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s}
  .track::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
  .toggle input:checked + .track{background:rgba(0,229,160,.18)}
  .toggle input:checked + .track::before{transform:translateX(18px);background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .toggle-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-right:6px}
  .toggle-label.on{color:var(--accent)}

  .status{padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .dot.ok{background:var(--accent);box-shadow:0 0 5px var(--accent)}
  .dot.bad{background:var(--danger)}
  .dot.warn{background:var(--warn)}
  #status-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  #key-banner{display:none;background:rgba(245,158,11,.12);border-bottom:1px solid var(--warn);color:var(--warn);font-family:var(--mono);font-size:10px;padding:8px 14px;line-height:1.6;text-align:center}
  #key-banner a{color:#ffd35a;text-decoration:underline;cursor:pointer}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--border);gap:1px}
  .stat{background:var(--bg);padding:11px 6px;text-align:center}
  .stat-val{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.02em}
  .stat-val.t{color:var(--text)}
  .stat-val.b{color:var(--danger)}
  .stat-val.s{color:var(--accent)}
  .stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

  .feed-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px}
  .feed-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
  .live{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite}
  @keyframes blink{50%{opacity:.3}}
  .clear-btn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:9px;cursor:pointer;padding:2px 6px;border-radius:3px}
  .clear-btn:hover{background:var(--bg3);color:var(--text)}

  .feed{height:200px;overflow-y:auto;padding:0 8px 8px}
  .feed::-webkit-scrollbar{width:3px}
  .feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:10px;text-align:center;line-height:1.6}
  .empty-icon{font-size:22px;opacity:.4}

  .row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:4px;margin-bottom:2px;animation:rowIn .2s ease}
  @keyframes rowIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
  .row:hover{background:var(--bg3)}
  .row.blocked{background:rgba(255,71,87,.08)}
  .row-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .row-dot.safe{background:var(--accent)}
  .row-dot.blocked{background:var(--danger)}
  .row-domain{flex:1;font-family:var(--mono);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row.blocked .row-domain{color:var(--danger)}
  .row-conf{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px}
  .row-conf.safe{background:rgba(0,229,160,.1);color:var(--accent)}
  .row-conf.blocked{background:rgba(255,71,87,.12);color:var(--danger)}
  .row-time{font-family:var(--mono);font-size:9px;color:var(--muted);min-width:38px;text-align:right}

  .settings{border-top:1px solid var(--border);background:var(--bg2)}
  .set-toggle{width:100%;background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;padding:8px 16px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .set-toggle:hover{color:var(--text)}
  .chev{transition:.2s}
  .chev.open{transform:rotate(180deg)}
  .set-body{display:none;padding:0 16px 14px;flex-direction:column;gap:10px}
  .set-body.open{display:flex}
  .lbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .set-body input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;border-radius:5px;outline:none}
  .set-body input:focus{border-color:var(--accent)}
  .pwwrap{position:relative}
  .pwwrap input{padding-right:50px}
  .pweye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:10px}
  .save-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;font-size:12px;border:none;padding:9px;border-radius:6px;cursor:pointer}
  .save-btn:hover{opacity:.92}
  .save-msg{font-family:var(--mono);font-size:10px;text-align:center;min-height:14px;color:var(--accent)}
  .save-msg.err{color:var(--warn)}

  .test-row{display:flex;gap:6px}
  .test-row input{flex:1}
  .test-btn{background:transparent;color:var(--accent);border:1px solid rgba(0,229,160,.3);padding:6px 12px;border-radius:5px;cursor:pointer;font-family:var(--mono);font-size:10px;white-space:nowrap}
  .test-btn:hover{background:rgba(0,229,160,.08)}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="shield">🛡</div>
    <div>
      <div class="brand-name">Secure DNS Queries</div>
      <div class="brand-sub">LIVE BROWSER MONITOR</div>
    </div>
  </div>
  <div style="display:flex;align-items:center">
    <span class="toggle-label" id="t-lbl">OFF</span>
    <label class="toggle">
      <input type="checkbox" id="t-input">
      <span class="track"></span>
    </label>
  </div>
</div>

<div class="status">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Checking…</span>
</div>

<div id="key-banner">
  ⚠ Add your API key below to start monitoring.<br>
  Need one? <a id="open-profile">Open profile →</a>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val t" id="kpi-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val b" id="kpi-blocked">0</div><div class="stat-lbl">Blocked</div></div>
  <div class="stat"><div class="stat-val s" id="kpi-safe">0</div><div class="stat-lbl">Safe</div></div>
</div>

<div class="feed-head">
  <div class="feed-title"><span class="live"></span>Live Activity</div>
  <button class="clear-btn" id="clear-btn">clear</button>
</div>
<div class="feed" id="feed">
  <div class="empty" id="empty">
    <div class="empty-icon">📡</div>
    <div>Waiting for navigation…<br>Domains appear as you browse.</div>
  </div>
</div>

<div class="settings">
  <button class="set-toggle" id="set-toggle">
    <span>⚙ SETTINGS</span><span class="chev" id="chev">▾</span>
  </button>
  <div class="set-body" id="set-body">
    <div>
      <div class="lbl">Server URL</div>
      <input type="text" id="server" placeholder="http://localhost:5000">
    </div>
    <div>
      <div class="lbl">API Key</div>
      <div class="pwwrap">
        <input type="password" id="apikey" placeholder="sk-…" autocomplete="off" spellcheck="false">
        <button type="button" class="pweye" id="eye">show</button>
      </div>
    </div>
    <button class="save-btn" id="save-btn">Save Settings</button>
    <div class="save-msg" id="save-msg"></div>
    <div>
      <div class="lbl">Manual Test</div>
      <div class="test-row">
        <input type="text" id="test-input" placeholder="example.com">
        <button class="test-btn" id="test-btn">Classify</button>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
