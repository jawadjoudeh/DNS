<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – SecureDNS Guard</title>
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <svg viewBox="0 0 24 24" fill="var(--accent)" width="48" height="48"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                <h2 style="margin-top:0.75rem;">Admin Console</h2>
                <p class="text-muted" style="margin-top:0.25rem;">Enter the admin panel token</p>
            </div>

            <form action="/admin/login" method="POST">
                <label style="font-weight:500; font-size:0.875rem; display:block; color:var(--text-secondary); margin-bottom:0.25rem;">Admin Token</label>
                <input type="password" name="token" placeholder="Enter admin token" required>
                {% if error %}<div class="text-danger mb-3" style="font-size:0.85rem;">{{ error }}</div>{% endif %}
                <button type="submit" class="btn" style="width:100%;">Sign in as Admin</button>
            </form>

            <div style="text-align:center; margin-top:1.5rem; font-size:0.85rem;">
                <a href="/login.html" style="color:var(--text-secondary);">← User login</a>
            </div>
        </div>
    </div>
    <script>
        (function(){
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</body>
</html>
