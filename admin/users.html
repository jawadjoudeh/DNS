<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users – SecureDNS Guard Admin</title>
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-sidebar { width: 250px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 1.5rem 0; }
        .admin-sidebar .sidebar-header { padding: 0 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .admin-sidebar .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: var(--text-primary); font-weight: 500; border-left: 3px solid transparent; }
        .admin-sidebar .nav-item:hover { background: rgba(0,0,0,0.03); }
        .admin-sidebar .nav-item.active { background: rgba(93,185,118,0.08); color: var(--accent); border-left-color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <svg viewBox="0 0 24 24" fill="var(--accent)" width="28" height="28"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                <span style="font-size:1.25rem; font-weight:700;">Admin</span>
            </div>
            <a href="/admin/dashboard" class="nav-item"><i>📊</i> Dashboard</a>
            <a href="/admin/logs" class="nav-item"><i>📋</i> All Logs</a>
            <a href="/admin/users" class="nav-item active"><i>👥</i> Users</a>
            <a href="/admin/model" class="nav-item"><i>🧠</i> ML Model</a>
            <div style="flex:1;"></div>
            <a href="/admin/logout" class="nav-item" style="color:var(--danger);"><i>🚪</i> Logout</a>
        </aside>

        <main class="main-wrapper">
            <header class="topbar">
                <span style="font-weight:500;">User Management</span>
                <button class="theme-toggle" id="theme-toggle">🌙</button>
            </header>

            <div class="content">
                <div class="page-header">
                    <h1 class="page-title">Manage Users</h1>
                    <input type="text" id="user-search" placeholder="Search username or email…" style="width: 250px; margin: 0;">
                </div>

                <div class="card" style="padding:0; overflow:hidden;">
                    <div class="table-responsive" style="margin:0;">
                        <table id="users-table">
                            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Plan</th><th>Queries</th><th>Actions</th></tr></thead>
                            <tbody id="u-body"><tr><td colspan="6" style="text-align:center; padding:3rem;">Loading…</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Theme
        (function(){
            const btn=document.getElementById('theme-toggle'); const saved=localStorage.getItem('theme');
            if(saved==='dark'||(!saved&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');btn.textContent='☀️';}
            btn.addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('theme',d?'light':'dark');btn.textContent=d?'🌙':'☀️';});
        })();

        async function loadUsers() {
            const res = await fetch('/admin/api/users');
            if (!res.ok) return;
            const users = await res.json();
            const tb = document.getElementById('u-body');
            tb.innerHTML = '';
            users.forEach(u => {
                tb.innerHTML += `<tr>
                    <td>${u.user_id}</td>
                    <td>${u.username} ${u.is_admin ? '<span class="badge red">Admin</span>' : ''}</td>
                    <td>${u.email}</td>
                    <td>
                        <select onchange="updatePlan(${u.user_id}, this.value)" style="padding:0.2rem; width:auto; margin:0;">
                            <option value="free" ${u.plan==='free'?'selected':''}>Free</option>
                            <option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option>
                        </select>
                    </td>
                    <td>${u.total_queries || 0}</td>
                    <td>
                        <button class="btn outline" onclick="toggleAdmin(${u.user_id}, ${!u.is_admin})" style="padding:0.2rem 0.5rem; font-size:0.75rem;">Toggle Admin</button>
                        <button class="btn danger" onclick="deleteUser(${u.user_id})" style="padding:0.2rem 0.5rem; font-size:0.75rem;">Delete</button>
                    </td>
                </tr>`;
            });
        }

        async function updatePlan(id, plan) {
            await fetch('/admin/api/update-plan', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, plan})});
        }
        async function toggleAdmin(id, status) {
            await fetch('/admin/api/toggle-admin', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, is_admin:status})});
            loadUsers();
        }
        async function deleteUser(id) {
            if(!confirm('Delete this user?')) return;
            await fetch(`/admin/api/delete-user/${id}`, {method:'DELETE'});
            loadUsers();
        }

        document.addEventListener("DOMContentLoaded", loadUsers);
    </script>
</body>
</html>
