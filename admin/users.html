<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users – Secure DNS Queries Admin</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-sidebar { width: 230px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
        .admin-sidebar-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.65rem; }
        .admin-sidebar-title { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em; }
        .admin-sidebar-badge { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; background: var(--danger); color: #fff; padding: 0.1rem 0.4rem; border-radius: 4px; letter-spacing: 0.06em; }
        .admin-nav { padding: 1rem 0; flex: 1; display: flex; flex-direction: column; }
        .admin-nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.65rem 1.5rem; color: var(--text-secondary); font-weight: 500; font-size: 0.875rem; border-left: 3px solid transparent; text-decoration: none; transition: all 0.15s; }
        .admin-nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .admin-nav-item.active { color: var(--accent); background: var(--accent-glow); border-left-color: var(--accent); font-weight: 600; }
        .admin-nav-item i { font-style: normal; width: 20px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .admin-nav-divider { height: 1px; background: var(--border-color); margin: 0.75rem 1rem; }
        .admin-nav-spacer { flex: 1; }
        @media (max-width: 860px) { .admin-sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div style="width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" width="17" height="17" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </div>
                <div>
                    <div class="admin-sidebar-title">Secure DNS Queries</div>
                    <div class="admin-sidebar-badge">Admin</div>
                </div>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard" class="admin-nav-item"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></i> Dashboard</a>
                <a href="/admin/logs" class="admin-nav-item"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></i> All Logs</a>
                <a href="/admin/users" class="admin-nav-item active"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></i> Users</a>
                <a href="/admin/model" class="admin-nav-item"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></i> AI Model</a>
                <div class="admin-nav-divider"></div>
                <a href="/admin/settings" class="admin-nav-item"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></i> Settings</a>
                <div class="admin-nav-spacer"></div>
                <a href="/admin/logout" class="admin-nav-item" style="color:var(--danger);"><i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></i> Logout</a>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="topbar">
                <span style="font-weight:600;font-size:0.95rem;">User Management</span>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span class="badge red" style="font-size:0.65rem;">ADMIN</span>
                </div>
            </header>

            <div class="content">
                <div class="page-header">
                    <h1 class="page-title">Manage Users</h1>
                    <div style="display:flex; gap:0.75rem; align-items:center;">
                        <!-- Fake hidden inputs to absorb Chrome's aggressive auto-fill -->
                        <input type="text" style="display:none;" autocomplete="off">
                        <input type="password" style="display:none;" autocomplete="off">
                        <input type="search" id="table-filter-query" autocomplete="new-password" placeholder="Search username or email…" style="width:250px; margin:0;">
                        <button class="btn" onclick="openCreateModal()" style="margin:0;">+ Create User</button>
                    </div>
                </div>

                <div class="card" style="padding:0; overflow:hidden;">
                    <div class="table-responsive" style="margin:0;">
                        <table id="users-table">
                            <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Plan</th><th>Queries</th><th>Actions</th></tr></thead>
                            <tbody id="u-body"><tr><td colspan="6" style="text-align:center; padding:3rem;">Loading…</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        async function loadUsers() {
            const tb = document.getElementById('u-body');
            tb.innerHTML = '<tr><td colspan="6" class="skeleton" style="height:40px;border-color:transparent;"></td></tr>'.repeat(4);
            try {
                const res = await fetch('/admin/api/users');
                if (!res.ok) { tb.innerHTML = '<tr><td colspan="6" class="text-danger" style="text-align:center;padding:2rem;">Failed to load users.</td></tr>'; return; }
                const users = await res.json();
                if (!users.length) { tb.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:2rem;">No users found.</td></tr>'; return; }
                tb.innerHTML = users.map(u => `<tr>
                    <td>${u.user_id}</td>
                    <td>${u.username} ${u.is_admin ? '<span class="badge red">Admin</span>' : ''}</td>
                    <td>${u.email}</td>
                    <td>
                        <select onchange="updatePlan(${u.user_id}, this.value)" ${u.user_id == 1 || u.username == 'admin' ? 'disabled' : ''} style="padding:0.2rem; width:auto; margin:0;">
                            <option value="free" ${u.plan==='free'?'selected':''}>Free</option>
                            <option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option>
                        </select>
                    </td>
                    <td>
                        ${u.total_queries || 0}
                        <span class="text-muted" style="font-size: 0.75rem; display: block; margin-top: 0.2rem;">
                            (${u.queries_today || 0} today)
                        </span>
                    </td>
                    <td>
                        ${u.user_id == 1 || u.username == 'admin' ? '<span class="badge" style="background:var(--accent-glow); color:var(--accent); font-size:0.7rem; font-weight:600; padding:0.25rem 0.5rem; border-radius:4px; border:1px solid var(--accent);">Protected</span>' : `
                            <button class="btn outline" onclick="toggleAdmin(${u.user_id}, ${!u.is_admin})" style="padding:0.2rem 0.5rem; font-size:0.75rem;">Toggle Admin</button>
                            <button class="btn danger" onclick="deleteUser(${u.user_id})" style="padding:0.2rem 0.5rem; font-size:0.75rem;">Delete</button>
                        `}
                    </td>
                </tr>`).join('');
            } catch { tb.innerHTML = '<tr><td colspan="6" class="text-danger" style="text-align:center;padding:2rem;">Failed to load users.</td></tr>'; }
        }

        async function updatePlan(id, plan) {
            const res = await fetch('/admin/api/update-plan', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, plan})});
            if (res.ok) showToast('Plan updated', 'success'); else showToast('Failed to update plan', 'error');
        }
        async function toggleAdmin(id, status) {
            const res = await fetch('/admin/api/toggle-admin', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id, is_admin:status})});
            if (res.ok) { showToast('Admin status updated', 'success'); loadUsers(); } else showToast('Failed', 'error');
        }
        async function deleteUser(id) {
            if (!await showConfirm('Delete this user and all their data? This cannot be undone.')) return;
            const res = await fetch(`/admin/api/delete-user/${id}`, {method:'DELETE'});
            if (res.ok) { showToast('User deleted', 'success'); loadUsers(); } else showToast('Failed to delete user', 'error');
        }

        document.getElementById('table-filter-query').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            document.querySelectorAll('#u-body tr').forEach(tr => {
                tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                const el = document.getElementById('table-filter-query');
                if (el) el.value = '';
            }, 60);
        });

        document.addEventListener("DOMContentLoaded", loadUsers);

        function openCreateModal() {
            document.getElementById('cu-username').value = '';
            document.getElementById('cu-email').value = '';
            document.getElementById('cu-name').value = '';
            document.getElementById('cu-password').value = '';
            document.getElementById('cu-plan').value = 'free';
            document.getElementById('cu-role').value = 'user';
            document.getElementById('create-modal').style.display = 'flex';
        }
        function closeCreateModal() {
            document.getElementById('create-modal').style.display = 'none';
        }
        async function submitCreateUser() {
            const username = document.getElementById('cu-username').value.trim();
            const email = document.getElementById('cu-email').value.trim();
            const name = document.getElementById('cu-name').value.trim();
            const password = document.getElementById('cu-password').value;
            const plan = document.getElementById('cu-plan').value;
            const role = document.getElementById('cu-role').value;
            
            if (!username || !email || !password) {
                showToast('Username, Email, and Password are required!', 'error');
                return;
            }
            const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,}$/;
            if (!pwRegex.test(password)) {
                showToast('Password must be at least 8 characters and contain at least one uppercase letter, one lowercase letter, one number, and one special character (@$!%*?&#).', 'error');
                return;
            }
            
            const res = await fetch('/admin/api/create-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username, email, name, password, plan,
                    is_admin: role === 'admin'
                })
            });
            
            if (res.ok) {
                showToast('User created successfully!', 'success');
                closeCreateModal();
                loadUsers();
            } else {
                const data = await res.json();
                showToast(data.error || 'Failed to create user', 'error');
            }
        }
    </script>

    <!-- Create User Modal -->
    <div id="create-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
        <div class="card" style="width:400px; padding:2rem; border-color:var(--border-color); background:var(--bg-card);">
            <div class="card-header" style="padding-bottom:1rem; border-bottom:1px solid var(--border-color); margin-bottom:1.5rem;">
                <h3 class="card-title">Create New User</h3>
            </div>
            <div style="display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Username</label>
                    <input type="text" id="cu-username" placeholder="e.g. jawad" style="width:100%; margin:0;">
                </div>
                <div>
                    <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Email</label>
                    <input type="email" id="cu-email" placeholder="e.g. jawad@gmail.com" style="width:100%; margin:0;">
                </div>
                <div>
                    <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Full Name</label>
                    <input type="text" id="cu-name" placeholder="e.g. Jawad Joodeh" style="width:100%; margin:0;">
                </div>
                <div>
                    <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Password (min 8 chars)</label>
                    <input type="password" id="cu-password" placeholder="••••••••" style="width:100%; margin:0;">
                </div>
                <div style="display:flex; gap:1rem;">
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Plan</label>
                        <select id="cu-plan" style="width:100%; margin:0; padding:0.4rem; background:var(--bg-base); border-color:var(--border-color); color:var(--text-primary); border-radius:var(--border-radius-sm);">
                            <option value="free">Free</option>
                            <option value="pro">Pro</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:0.4rem; color:var(--text-secondary);">Role</label>
                        <select id="cu-role" style="width:100%; margin:0; padding:0.4rem; background:var(--bg-base); border-color:var(--border-color); color:var(--text-primary); border-radius:var(--border-radius-sm);">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:0.75rem; justify-content:flex-end; margin-top:2rem;">
                <button class="btn outline" onclick="closeCreateModal()">Cancel</button>
                <button class="btn" onclick="submitCreateUser()">Save User</button>
            </div>
        </div>
    </div>
</body>
</html>
